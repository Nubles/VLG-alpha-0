name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Configure, build, and test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Debug *> build-output.txt
          Get-Content build-output.txt
          if ($LASTEXITCODE -ne 0) {
            throw "CMake build failed with exit code $LASTEXITCODE"
          }

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-output
          path: build-output.txt

      - name: Run EngineCoreTests
        shell: pwsh
        run: |
          .\build\Debug\EngineCoreTests.exe
          if ($LASTEXITCODE -ne 0) {
            throw "EngineCoreTests failed with exit code $LASTEXITCODE"
          }
